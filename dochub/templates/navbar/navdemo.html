{% load static %}
<header class="navbar">
    <div class="menu-icon">☰</div>
    <div class="search-bar">
        <input type="text" placeholder="Search">
    </div>
    <div class="nav-icons">
        <div class="notifications">
            <img src="{% static 'noti-icon.png' %}" alt="Notifications">
            <span class="badge">6</span>
        </div>
        <div class="language-selector">
            <img src="{% static 'language-icon.png' %}" alt="Flag">
            <span>English</span>
            <span class="dropdown-icon">▼</span>
        </div>
        <div class="profile">
            <img src="{% static 'acc-icon.png' %}" alt="Profile">
            <div class="profile-info">
                <span>Moni Roy</span>
                <span>Profile</span>
            </div>
            <span class="dropdown-icon">▼</span>
        </div>
    </div>
</header>
